<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Paso 3 - Generador Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eafaf1; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 450px; }
        h2 { color: #27ae60; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input[type="file"] { width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 5px; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #1e8449; transform: scale(1.02); }
        .back { display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-file-excel"></i> Paso 3: Formato Final</h2>
        <form action="/action_formato" method="post" enctype="multipart/form-data">
            <div class="input-group">
                <label>Sube el Excel ya Complementado:</label>
                <input type="file" name="completo" required accept=".xlsx">
            </div>
            <div class="input-group">
                <label>Sube la Plantilla Oficial Final:</label>
                <input type="file" name="final" required accept=".xlsx">
            </div>
            <button type="submit" class="btn">Generar Reporte Final</button>
        </form>
        <a href="/" class="back"><i class="fas fa-arrow-left"></i> Volver al Menú</a>
    </div>
</body>
</html>
