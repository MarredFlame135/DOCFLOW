{% extends "base.html" %}
{% block title %}Paso 2 - Complementar Datos{% endblock %}
{% block content %}
<style>
    .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; width: 100%; margin-top: 20px; }
    h2 { color: var(--accent-blue); margin-top: 0; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
    input[type="file"] { width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 5px; box-sizing: border-box; }
    .btn { background: var(--accent-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
    .btn:hover { background: #2471a3; transform: scale(1.02); }
</style>

<div class="card">
    <h2><i class="fas fa-sync-alt"></i> Paso 2: Complementar</h2>
    <form action="/action_comparar" method="post" enctype="multipart/form-data">
        <div class="input-group">
            <label>Excel con Datos Nuevos (Paso 1):</label>
            <input type="file" name="reciente" required accept=".xlsx">
        </div>
        <div class="input-group">
            <label>Excel Maestro (Base de Datos):</label>
            <input type="file" name="maestro" required accept=".xlsx">
        </div>
        <button type="submit" class="btn">Cruzar y Completar</button>
    </form>
</div>
{% endblock %}
