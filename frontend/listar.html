<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Paso 3 - Inventario de PDFs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4ecf7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        h2 { color: #9b59b6; }
        .btn { background: #9b59b6; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .back { display: block; margin-top: 15px; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-list-ol"></i> Inventario de Archivos</h2>
        <p>Selecciona los PDFs para generar la lista de nombres.</p>
        <form action="/action_listar" method="post" enctype="multipart/form-data">
            <input type="file" name="pdfs" multiple required accept=".pdf">
            <button type="submit" class="btn">Generar Lista de Excel</button>
        </form>
        <a href="/" class="back">Volver al Menú</a>
    </div>
</body>
</html>
