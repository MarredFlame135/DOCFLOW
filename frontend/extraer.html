<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Paso 1 - Extractor PDF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #feebeb; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 450px; }
        h2 { color: #e74c3c; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input[type="file"] { width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 5px; }
        .btn { background: #e74c3c; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #c0392b; transform: scale(1.02); }
        .back { display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-file-pdf"></i> Paso 1: Extractor</h2>
        <form action="/action_extraer" method="post" enctype="multipart/form-data">
            <div class="input-group">
                <label>Selecciona los Certificados (PDF):</label>
                <input type="file" name="pdfs" multiple required accept=".pdf">
            </div>

            <div class="input-group">
                <label>Sube el Formato Base (Excel):</label>
                <input type="file" name="plantilla" required accept=".xlsx">
            </div>
            <button type="submit" class="btn">Extraer y Descargar</button>
        </form>
        <a href="/" class="back"><i class="fas fa-arrow-left"></i> Volver al Menú</a>
    </div>
    <!-- Dentro del <form> en extraer.html -->
<div class="upload-section">
    <label><i class="fas fa-comment-dots"></i> ¿Qué información deseas extraer?</label>
    <textarea name="instrucciones" placeholder="Ej: Extrae el folio, la fecha de inicio y el nombre del instructor..." rows="3" style="width: 100%; border-radius: 10px; padding: 10px; border: 1px solid #ddd;"></textarea>
</div>
</body>
</html>
