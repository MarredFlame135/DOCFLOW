{% extends "base.html" %}
{% block title %}Paso 1 - Extractor PDF{% endblock %}
{% block content %}
<style>
    .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; width: 100%; margin-top: 20px; }
    h2 { color: var(--accent); margin-top: 0; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
    input[type="file"] { width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 5px; box-sizing: border-box; }
    .btn { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
    .btn:hover { background: #c0392b; transform: scale(1.02); }
</style>

<div class="card">
    <h2><i class="fas fa-file-pdf"></i> Paso 1: Extractor</h2>
    <form action="/action_extraer" method="post" enctype="multipart/form-data">
        <div class="input-group">
            <label>Selecciona los Certificados (PDF):</label>
            <input type="file" name="pdfs" multiple required accept=".pdf">
        </div>

        <div class="input-group">
            <label>Sube el Formato Base (Excel):</label>
            <input type="file" name="plantilla" required accept=".xlsx">
        </div>
        <button type="submit" class="btn">Extraer y Descargar</button>
    </form>
</div>
{% endblock %}
